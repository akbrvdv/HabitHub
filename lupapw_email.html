<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/HabitHub icon.png" type="png/jpg" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles_lupapw.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="image-placeholder"></div>
      <h1>Reset Password</h1>
      <p class="subtitle">
        Masukkan alamat email kamu untuk menerima kode verifikasi
      </p>

      <form>
        <div class="form-group">
          <label for="email">Email konfirmasi</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              name="email"
              class="email-input"
              placeholder="@"
              required
            />
          </div>
        </div>

        <button type="submit">Reset Password</button>

        <a href="register.html" class="return-link">Kembali ke Register</a>
      </form>
    </div>
  </body>
</html>

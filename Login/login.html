<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="icon" href="assets/HabitHub icon.png" type="png" />
    <link rel="stylesheet" href="styles_login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="left-section">
        <div class="content">
          <img src="assets/HabitHub logo w.png" alt="logo" width="200px" />
          <h1>
            Kamu pasti <br />bisa "<span class="h1span" id="typewriter"></span>"
          </h1>
          <p>
            HabitHub membantu Anda untuk membuat dan mengelola Kebiasaan baik,
            memungkinkan mencapai goals jangka panjang.
          </p>
          <!--                 <div class="buttons"> -->
          <!--                 <button class="btn-apaituhabithub" onclick="location.href='index.html'">Apa itu HabitHub?</button> -->
          <!--                 </div> -->
        </div>
      </div>
      <div class="right-section">
        <div class="form-container">
          <h1>Login.</h1>

          <form>
            <div class="form-group">
              <label for="username">Username</label>
              <div class="input-icon">
                <input type="text" id="username" value="" />
              </div>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-icon">
                <input type="password" id="password" />
                <i class="material-icons eye-icon">visibility_off</i>
              </div>
            </div>

            <div class="login-link">
              <p>
                <a href="lupapw_email.html"><b>Lupa password?</b></a>
              </p>
            </div>
            <!-- captcha  -->
            <div class="form-group">
              <label for="captcha">Captcha</label>
              <div class="captcha-container">
                <span id="captcha-text"></span>
                <button type="button" id="refresh-captcha">Refresh</button>
              </div>
              <input
                type="text"
                id="captcha-input"
                placeholder="Masukkan Captcha"
              />
              <p
                id="captcha-error"
                class="error-message"
                style="display: none"
              ></p>
            </div>
            <button type="submit" class="btn-login-account">
              <b>Login</b>
            </button>

            <div class="login-link">
              <p>
                Belum punya akun?
                <a href="register.html"><b>Daftar</b></a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>

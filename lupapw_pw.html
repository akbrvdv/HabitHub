<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/HabitHub icon.png" type="png/jpg" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles_lupapw.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1>Buat Password baru</h1>

      <form>
        <div class="form-group">
          <label for="password">Password baru</label>
          <div class="input-icon">
            <input type="password" id="password" />
            <i class="material-icons eye-icon">visibility_off</i>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">konfirmasi password baru</label>
          <div class="input-icon">
            <input type="password" id="confirmPassword" value="" />
            <i class="material-icons eye-icon">visibility_off</i>
          </div>
        </div>

        <button type="submit"><b>Reset Password</b></button>

        <a href="#" class="return-link"><b>Kembali ke Register</b></a>
      </form>
    </div>
    <script src="lupapw.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - HabitHub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

    <div class="left-panel">
      <div class="logo">
        <img src="logohabithub.png" alt="HabitHub Logo">
      </div>
      <div class="start-adventure"><b>HabitHub</b></div>
      <button class="signup-button">Sign up</button>
      <div class="signup-link">You don't have an account? <a href="#"><br>Sign up here</a></div>
    </div>

    <div class="right-panel">
      <h2>Log In</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="password">
          <div class="error-message" id="errorMessage">Incorrect password</div>
        </div>
        <button type="submit" class="submit-button">Log in</button>
      </form>
      <div class="form-footer">First time here? <a href="#">Sign up</a></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitHub Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon"> H </span> HabitHub
            </div>
            <nav id="main-nav">
                <ul>
                    <li>
                        <a href="#dashboard" class="nav-link active" data-target="dashboard-content">
                            <span class="icon">🏠</span> Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="#history" class="nav-link" data-target="history-content">
                            <span class="icon">📜</span> Riwayat
                        </a>
                    </li>
                    </ul>
            </nav>
            <div class="user-profile" id="sidebar-profile-trigger"> <img src="assets/profile_placeholder.png" alt="User Avatar" id="sidebar-avatar"> <div class="user-info">
                    <span class="username" id="sidebar-username">Nama User</span>
                    <span class="email" id="sidebar-email">email@contoh.com</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="title">
                    <h1 id="main-title">Dashboard</h1>
                    <p id="main-subtitle">Habit hari ini</p>
                </div>
                <button class="add-habit-btn" id="add-habit-header-btn">Tambah Habit +</button>
            </header>

            <div id="dashboard-content" class="content-section active">
                 <div class="content-grid">
                    <section class="habit-section">
                        <h2 class="section-title visually-hidden">Daftar Habit</h2>
                        <div class="habit-list" id="habit-list-container">
                             <p class="no-habits-message">Memuat habit...</p>
                             </div>
                    </section>
                    <aside class="right-panel">
                       <div class="stats-area">
                           <div class="stat-card streak"><span class="bg-icon">🔥</span><p>Runtutan Tertinggi</p><h2 id="global-streak">- Hari</h2> </div>
                           <div class="stat-card failed"><span class="bg-icon">❗</span><p>Total Gagal</p><h2 id="global-failed">- Hari</h2> </div>
                           <div class="stat-card completed"><span class="bg-icon">⭐</span><p>Total Selesai</p><h2 id="global-completed">- Kali</h2> </div>
                       </div>
                       <div class="calendar">
                           <div class="calendar-header"><h2 id="calendar-month-year">Memuat...</h2><div class="calendar-nav"><button id="calendar-prev">&lt;</button><button id="calendar-next">&gt;</button></div></div>
                           <div class="calendar-days-header"><span>SEN</span><span>SEL</span><span>RAB</span><span>KAM</span><span>JUM</span><span>SAB</span><span>MIN</span></div>
                           <div class="calendar-grid" id="calendar-grid-container">
                               </div>
                       </div>
                    </aside>
                </div>
            </div>

            <div id="history-content" class="content-section">
                 <div class="history-card-section">
                    <div class="history-list-content-section" id="history-list">
                        <p class="loading-message">Memuat riwayat...</p>
                        </div>
                </div>
            </div>

            <div id="profile-content" class="content-section">
                 <div class="profile-card-section">
                    <div class="profile-left-column">
                         <div class="profile-picture-container">
                             <img src="assets/profile_placeholder.png" alt="Foto Profil User" class="profile-picture" id="profile-image"> <button class="edit-picture-btn" aria-label="Ubah foto profil">
                                 <i class="fas fa-camera"></i> </button>
                             <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                         </div>
                         <div class="profile-actions-secondary">
                             <button class="change-password-btn">Ganti Password</button>
                             <button class="delete-account-btn">Hapus Akun</button>
                         </div>
                    </div>
                    <div class="profile-info" id="profile-details">
                        <div class="profile-field">
                            <label for="profile-username">Username:</label>
                            <input type="text" id="profile-username" placeholder="Username" readonly disabled>
                            </div>
                        <div class="profile-field">
                             <label for="profile-first-name">Nama Lengkap:</label>
                             <div class="name-inputs">
                                 <input type="text" id="profile-first-name" placeholder="Nama Depan" readonly>
                                 <input type="text" id="profile-last-name" placeholder="Nama Belakang" readonly>
                             </div>
                             <button class="edit-field-btn" data-target-fields="profile-first-name,profile-last-name" aria-label="Edit Nama Lengkap">
                                 <i class="fas fa-pencil-alt"></i>
                             </button>
                         </div>
                         <div class="profile-field">
                             <label for="profile-email">Email:</label>
                             <input type="email" id="profile-email" placeholder="Email" readonly>
                             <button class="edit-field-btn" data-target-fields="profile-email" aria-label="Edit Email">
                                 <i class="fas fa-pencil-alt"></i>
                             </button>
                         </div>
                         <div class="profile-field">
                             <label for="profile-phone">Nomor Telepon:</label>
                             <input type="tel" id="profile-phone" placeholder="Nomor Telepon (Opsional)" readonly>
                             <button class="edit-field-btn" data-target-fields="profile-phone" aria-label="Edit Nomor Telepon">
                                 <i class="fas fa-pencil-alt"></i>
                             </button>
                         </div>
                         <div class="profile-actions-main">
                            <button class="save-profile-btn" style="display: none;"> <i class="fas fa-save"></i> Simpan Perubahan
                            </button>
                            <span class="save-status" style="display: none; margin-left: 10px;"></span> </div>
                    </div>
                </div>
            </div>

            </main>
    </div>

    <div id="habit-modal" class="modal" aria-labelledby="modal-title" aria-hidden="true" role="dialog">
        <div class="modal-content">
            <button class="close-btn" aria-label="Tutup">&times;</button>
            <h2 id="modal-title">Tambah Habit Baru</h2>
            <form id="habit-form">
                <input type="hidden" id="habit-id">
                <div class="form-group">
                    <label for="habit-name">Nama Habit:</label>
                    <input type="text" id="habit-name" required>
                </div>
                <div class="form-group">
                    <label for="habit-icon">Ikon Habit (Emoji):</label>
                    <input type="text" id="habit-icon" placeholder="Contoh: 😊, 🏃, 📚">
                </div>
                <div class="form-actions">
                    <button type="submit" id="save-habit-btn">Simpan</button>
                    <button type="button" id="cancel-btn">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>

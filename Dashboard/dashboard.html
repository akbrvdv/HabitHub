<!DOCTYPE html>
<html lang="id"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitHub Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon"> H </span> HabitHub
            </div>
            <nav>
                <ul>
                    <li>
                        <a href="#" class="active">
                            <span class="icon">🏠</span> Dashboard
                        </a>
                    </li>
                    </ul>
            </nav>
            <div class="user-profile">
                <img src="assets/profile user image.jpeg" alt="User Avatar">
                <div class="user-info">
                    <span class="username">Meow</span>
                    <span class="email">meow123@gmail.com</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="title">
                    <h1>Dashboard</h1>
                    <p>Habit hari ini</p>
                </div>
                <button class="add-habit-btn">Tambah Habit +</button>
            </header>

            <div class="content-grid">
                <section class="habit-section">
                    <h2 class="section-title visually-hidden">Daftar Habit</h2> <div class="habit-list" id="habit-list-container">
                        </div>
                </section>

                <aside class="right-panel">
                   <div class="stats-area">
                       <div class="stat-card streak">
                           <span class="bg-icon">🔥</span>
                           <p>Runtutan Tertinggi</p>
                           <h2 id="global-streak">- Hari</h2> </div>
                       <div class="stat-card failed">
                           <span class="bg-icon">❗</span>
                           <p>Total Gagal</p>
                           <h2 id="global-failed">- Hari</h2> </div>
                       <div class="stat-card completed">
                           <span class="bg-icon">⭐</span>
                           <p>Total Selesai</p>
                           <h2 id="global-completed">- Kali</h2> </div>
                   </div>

                   <div class="calendar">
                       <div class="calendar-header">
                           <h2 id="calendar-month-year">Memuat...</h2>
                           <div class="calendar-nav">
                               <button id="calendar-prev" aria-label="Bulan Sebelumnya">&lt;</button>
                               <button id="calendar-next" aria-label="Bulan Berikutnya">&gt;</button>
                           </div>
                       </div>
                       <div class="calendar-days-header" aria-hidden="true">
                           <span>SEN</span><span>SEL</span><span>RAB</span><span>KAM</span><span>JUM</span><span>SAB</span><span>MIN</span>
                       </div>
                       <div class="calendar-grid" id="calendar-grid-container" role="grid" aria-labelledby="calendar-month-year">
                           </div>
                   </div>
                </aside>
            </div>
        </main>
    </div>

    <div id="habit-modal" class="modal" aria-labelledby="modal-title" aria-hidden="true" role="dialog">
        <div class="modal-content">
            <button class="close-btn" aria-label="Tutup Modal">&times;</button>
            <h2 id="modal-title">Tambah Habit Baru</h2>
            <form id="habit-form">
                <input type="hidden" id="habit-id">
                <div class="form-group">
                    <label for="habit-name">Nama Habit:</label>
                    <input type="text" id="habit-name" required>
                </div>
                <div class="form-group">
                    <label for="habit-icon">Ikon Habit (Emoji):</label>
                    <input type="text" id="habit-icon" placeholder="Contoh: 😊, 🏃, 📚">
                </div>
                <div class="form-actions">
                    <button type="submit" id="save-habit-btn">Simpan</button>
                    <button type="button" id="cancel-btn">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>

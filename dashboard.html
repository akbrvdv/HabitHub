<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitHub - Beranda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <!-- Sidebar (sama seperti sebelumnya) -->
           <div class="sidebar-header">
                <img src="assets/HabitHub icon.png" alt="HabitHub Logo" width="100">
            </div>
            <nav class="menu">
                <a href="#" class="menu-item active">
                    <i class="material-icons">home</i>
                    <span>Beranda</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="material-icons">calendar_month</i>
                    <span>Kalender</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="material-icons">insert_chart</i>
                    <span>Progress</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="material-icons">settings</i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                 <a href="#" class="menu-item">
                    <i class="material-icons">logout</i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Kebiasaan Hari Ini</h1>
                <div class="user-profile">
                    <span class="username">User</span>
                    <i class="material-icons">account_circle</i>
                </div>
            </header>

            <div class="content">
                <div class="habit-list">
                    <div class="habit-item">
                        <div class="habit-details">
                            <h3>Minum Air Putih</h3>
                            <p>Target: 8 gelas</p>
                        </div>
                        <div class="habit-progress">
                            <div class="progress-bar">
                                <div class="progress" style="width: 75%;"></div>
                            </div>
                        </div>
                        <div class="habit-actions">
                            <button class="btn btn-check"><i class="material-icons">check</i></button>
                            <span class="habit-streak">3 hari</span>
                        </div>
                    </div>

                    <!-- Tambahkan habit-item lainnya di sini -->
                </div>
            </div>
        </main>
    </div>

    <script src="dash.js"></script>
</body>
</html>
